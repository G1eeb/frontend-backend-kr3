<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Для Android -->
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- Цвет темы для браузера -->
  <meta name="theme-color" content="#3498db">
  
  <!-- Для iOS -->
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Мои дела">
  
  <!-- Favicon -->
  <link rel="icon" href="/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
  
  <title>Мои дела | Офлайн-приложение</title>
  <link rel="stylesheet" href="https://unpkg.com/chota@latest">
  
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
    }
    nav {
      margin: 20px 0;
    }
    .tab {
      cursor: pointer;
      padding: 10px;
      text-align: center;
      background: #f8f9fa;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .tab.active {
      background: #3498db;
      color: white;
    }
    .offline-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ffc107;
      color: #856404;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: none;
    }
    .install-badge {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #3498db;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: none;
      cursor: pointer;
    }
    .install-badge:hover {
      background: #2980b9;
    }
    #app-content {
      margin-top: 2rem;
    }
    .button.success {
      background: #28a745;
      color: white;
    }
    .button.error {
      background: #dc3545;
      color: white;
    }
    footer {
      margin-top: 2rem;
      padding: 1rem;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h1>📋 Мои дела</h1>
  <p>Приложение работает офлайн</p>

  <!-- Навигация (App Shell) -->
  <nav class="row">
    <button id="home-btn" class="tab col-6 active">🏠 Главная</button>
    <button id="about-btn" class="tab col-6">ℹ️ О приложении</button>
  </nav>

  <!-- Динамический контент -->
  <main id="app-content"></main>

  <!-- Кнопки для push-уведомлений -->
  <footer class="is-center">
    <button id="enable-push" class="button success">🔔 Включить уведомления</button>
    <button id="disable-push" class="button error" style="display:none;">🔕 Отключить уведомления</button>
  </footer>

  <div class="offline-badge" id="offline-badge">📡 Офлайн-режим</div>
  <div class="install-badge" id="install-badge">📱 Установить приложение</div>

  <!-- Socket.IO клиент -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
